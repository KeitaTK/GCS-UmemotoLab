# Raspi用 rtk_forwarder 設定
# Mac側のRTK基地局（TCP:2101）からRTCMを受信し、
# /dev/ttyAMA4（GPIO12,13 → F9P Rover UART）へ注入する
#
# 【修正: 2026-07-21】 source_type=tcp（生TCPストリーム、NTRIPハンドシェイク不要）
#   ref: docs/04-testing/2026-07-21_rtk_failure_analysis.md Section 9.2
source:
  # tcp / ntrip / serial
  #   tcp   = 生TCPストリーム (rtk_base_station_v2.py の出力)
  #   ntrip = NTRIP caster (HTTPハンドシェイク有り)
  #   serial= シリアルポート直受け
  source_type: tcp

  # source_type: tcp の場合 → MacのRTK基地局（Tailscale IP直指定）
  host: 100.80.225.4
  port: 2101

  # source_type: ntrip の場合（使用しない）
  mountpoint: UBLOX_EVK_F9P
  user_agent: NTRIP PythonClient
  username: ""
  password: ""

  # source_type: serial の場合
  serial_port: COM8
  baudrate: 115200

  # 共通
  timeout_sec: 5.0

forward:
  # udp または serial
  type: serial

  # type: udp の場合
  host: 127.0.0.1
  port: 50010

  # type: serial の場合（F9P Rover UART: /dev/ttyAMA4）
  serial_port: /dev/ttyAMA4
  baudrate: 115200

retry:
  reconnect_sec: 3.0

log:
  level: INFO
  stats_interval_sec: 5

