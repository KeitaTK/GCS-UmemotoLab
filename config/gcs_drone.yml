# GCS Configuration — Raspi Direct (GCSをRaspi上で実行する場合)
# Raspi上のmavlink-routerがttyAMA0→UDP:14550にブリッジしている前提
#
# 使い方 (Raspi上で):
#   cd GCS-UmemotoLab
#   source .venv/bin/activate
#   export GCS_CONFIG_PATH=config/gcs_raspi_direct.yml
#   python app/main.py

connection_type: udp
udp_listen_port: 14551  # 14550はmavlink-routerが使用中なので別ポート

drones:
  drone1:
    system_id: 1
    endpoint: "127.0.0.1:14550"  # mavlink-routerのUDPサーバー
    name: "Pixhawk6C Main"
