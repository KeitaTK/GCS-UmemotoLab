# mavlink-router config for Raspi
# Pixhawk TELEM1 と GCS（UDP:14550）間のMAVLinkルーティング
#
# 配置先: /etc/mavlink-router/main.conf
#
# GPIOピンアサイン:
#   /dev/ttyAMA0 = GPIO 8(TXD), 10(RXD)  → Pixhawk TELEM1

[General]
# ログ出力
Log = /var/log/mavlink-router.log
DebugLog = /var/log/mavlink-router-debug.log

# MAVLink Dialect（v1/v2 自動検出のため指定しない）
MavlinkDialect = common

[UartEndpoint to_pixhawk]
Device = /dev/ttyAMA0
Baud = 115200
FlowControl = true

# GCS向け UDP エンドポイント（全GCS config が期待する標準ポート）
[UdpEndpoint to_gcs]
Address = 0.0.0.0
Port = 14550
Mode = Server

# 追加: TCPエンドポイント（直接TCP接続用・デバッグ用）
[TcpEndpoint to_gcs_tcp]
Address = 0.0.0.0
Port = 5760
