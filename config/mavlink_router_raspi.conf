# mavlink-router config for Raspi
# Pixhawk TELEM1 と GCS（TCP:5760）間のMAVLinkルーティング
#
# 配置先: /etc/mavlink-router/main.conf
#
# GPIOピンアサイン:
#   /dev/ttyAMA0 = GPIO 8(TXD), 10(RXD)  → Pixhawk TELEM1

[General]
# ログ出力
Log = /var/log/mavlink-router.log
DebugLog = /var/log/mavlink-router-debug.log

# MAVLink system-id（ルーター自身のID）
MavlinkDialect = common

[UartEndpoint to_pixhawk]
Device = /dev/ttyAMA0
Baud = 921600

[TcpEndpoint to_gcs]
Address = 0.0.0.0
Port = 5760
