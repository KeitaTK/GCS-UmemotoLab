# GCS Configuration - SSH Tunnel Mode (Recommended)
# Pixhawk TELEM1 → Raspberry Pi (UART) → mavlink-router → SSH Tunnel → MacBook GCS
#
# 事前にSSHトンネルを確立すること:
#   ssh -f -N -L 14550:localhost:14550 -L 5760:localhost:5760 raspi
#   (または: .venv/bin/python3 scripts/setup_ssh_tunnel.py)
#
connection_type: udp
udp_listen_port: 14551  # SSHトンネルが14550を使うため別ポート

drones:
  drone1:
    system_id: 1
    endpoint: "127.0.0.1:14550"  # SSHトンネル経由
    name: "Pixhawk6C Main"

# RTCM/RTK settings (disabled for now)
rtcm_enabled: false
rtcm_host: 192.168.11.62
rtcm_tcp_port: 2101