# GCS Configuration - SSH Tunnel Mode via Tailscale
# 
# 事前にSSHトンネルを確立すること:
#   ./scripts/launch_gcs_tailscale.sh  (自動)
#   または手動で:
#     ssh -f -N -L 14551:localhost:14551 raspi
#     python3 scripts/udp_tcp_bridge.py &
#
connection_type: udp
udp_listen_port: 14550

drones:
  drone1:
    system_id: 1
    endpoint: "127.0.0.1:14552"  # Bridge UDP port
    name: "Pixhawk6C Main"

rtcm_enabled: false
