# GCS Configuration - New Aircraft via Raspberry Pi Bridge (WiFi)
# Pixhawk TELEM1 → Raspberry Pi (UART) → UDP WiFi → MacBook GCS
connection_type: udp

# UDP settings: connect to Raspberry Pi via WiFi
udp_listen_port: 14550
drones:
  drone1:
    system_id: 1
    endpoint: "192.168.11.51:14550"

# RTCM/RTK settings (disabled for now)
rtcm_enabled: false
rtcm_host: 192.168.11.62
rtcm_tcp_port: 2101