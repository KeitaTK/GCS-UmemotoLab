# GCS Configuration - New Aircraft via Raspberry Pi Bridge (WiFi / Tailscale)
# Pixhawk TELEM1 → Raspberry Pi (UART) → UDP WiFi → MacBook GCS
connection_type: udp

# UDP settings: connect to Raspberry Pi
udp_listen_port: 14550
drones:
  drone1:
    system_id: 1
    # Tailscale IP (常時接続可能・テザリングでもOK)
    endpoint: "100.123.158.105:14550"
    # 研究室Wi-Fi直結の場合はこちら: "192.168.11.51:14550"

# RTCM/RTK settings (disabled for now)
rtcm_enabled: false
rtcm_host: 192.168.11.62
rtcm_tcp_port: 2101