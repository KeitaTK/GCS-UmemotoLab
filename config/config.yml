# config/config.yml — GCS-UmemotoLab 共通デフォルト設定
#
# OS環境別の上書きは config.win.yml / config.mac.yml で行う。
# 個人用設定は config.local.yml（gitignore 対象）で上書きする。
#
# 起動方法:
#   python app/main.py                        # config.yml を自動読み込み
#   GCS_CONFIG_PATH=config/custom.yml python app/main.py  # 明示指定

# ============================================================================
# MAVLink 接続設定（gcs.yml 由来）
# ============================================================================
connection:
  type: serial                  # serial または udp
  serial_port: /dev/ttyACM0     # Pixhawk USBシリアル（デフォルト）
  serial_baudrate: 115200       # ボーレート
  udp_listen_port: 14550        # UDPモード時の待受ポート

# ============================================================================
# ドローン設定
# ============================================================================
drones:
  drone1:
    system_id: 1
    endpoint: "127.0.0.1:14550"
    name: "Pixhawk6C Main"

# ============================================================================
# F9P ハードウェア設定（hardware.yml 由来）
# ============================================================================
f9p:
  serial_port: "COM8"           # F9P 接続シリアルポート（デフォルト: Windows）
  baudrate: 115200              # F9P ボーレート

base_station:
  fixed_lat: 35.681236          # 固定基準局 緯度
  fixed_lon: 139.767125         # 固定基準局 経度
  fixed_alt: 42.0               # 固定基準局 高度
  save_to_flash: true           # F9P設定をフラッシュに保存

# ============================================================================
# RTCM/RTK 設定
# ============================================================================
rtcm:
  enabled: true
  host: 127.0.0.1               # PC側（rtk_base_station接続用、旧TCP:2101）
  port: 2101                    # PC側（rtk_base_station接続用）

rtcm_send:
  target: "127.0.0.1:14550"     # GPS_RTCM_DATA 送信先（mavlink-router）
                                # 開発: 127.0.0.1:14550（同一マシン）
                                # 本番: localhost:14550（SSHトンネル経由）

# ============================================================================
# Web サーバー設定（FastAPI）
# ============================================================================
server:
  host: 0.0.0.0           # バインドアドレス（0.0.0.0 で全インターフェース）
  port: 8010               # ポート番号（学校のプロキシ 8080 と被らないように）

# ============================================================================
# ログ設定
# ============================================================================
log:
  # 全体のログレベル (DEBUG | INFO | WARNING | ERROR | CRITICAL)
  level: INFO

  # ターミナル（コンソール）出力設定
  console:
    enabled: true               # false でターミナル出力を停止
    level: ERROR                 # ターミナルのログレベル

  # ファイル出力設定
  file:
    enabled: true               # false でファイル出力を停止
    level: DEBUG                # ファイルのログレベル
    path: logs/gcs.log          # 出力先パス
    max_bytes: 5242880          # 1ファイル最大サイズ (5MB)
    backup_count: 5             # 保持するバックアップ数

  # 統計ログの表示間隔（秒）
  stats_interval_sec: 5

retry:
  reconnect_sec: 3.0
