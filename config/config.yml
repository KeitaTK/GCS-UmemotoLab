# config/config.yml — GCS-UmemotoLab 共通デフォルト設定
#
# OS環境別の上書きは config.win.yml / config.mac.yml で行う。
# 個人用設定は config.local.yml（gitignore 対象）で上書きする。
#
# 起動方法:
#   python app/main.py                        # config.yml を自動読み込み
#   GCS_CONFIG_PATH=config/custom.yml python app/main.py  # 明示指定

# ============================================================================
# MAVLink 接続設定（gcs.yml 由来）
# ============================================================================
connection:
  type: serial                  # serial または udp
  serial_port: /dev/ttyACM0     # Pixhawk USBシリアル（デフォルト）
  serial_baudrate: 115200       # ボーレート
  udp_listen_port: 14550        # UDPモード時の待受ポート

# ============================================================================
# ドローン設定
# ============================================================================
drones:
  drone1:
    system_id: 1
    endpoint: "127.0.0.1:14550"
    name: "Pixhawk6C Main"

# ============================================================================
# F9P ハードウェア設定（hardware.yml 由来）
# ============================================================================
f9p:
  serial_port: "COM8"           # F9P 接続シリアルポート（デフォルト: Windows）
  baudrate: 115200              # F9P ボーレート

base_station:
  # 動作モード: "auto" または "manual"
  #   auto   = USBポート自動検出 + 設定秒数単独測位で基準座標を自動取得
  #   manual = 下記の固定値を直接使用
  mode: "auto"
  
  # autoモード用設定
  auto_obs_duration: 10          # 単独測位の観測時間（秒）
  
  # manualモード用設定（mode=manual のときのみ使用）
  serial_port: "COM10"           # F9P 接続シリアルポート
  fixed_lat: 35.681236           # 固定基準局 緯度（degree）
  fixed_lon: 139.767125          # 固定基準局 経度（degree）
  fixed_alt: 42.0                # 固定基準局 高度（楕円体高 HAE）[m]
  save_to_flash: true            # F9P設定をフラッシュに保存

forward:
  host: 127.0.0.1               # RTCM UDP転送先ホスト
  port: 50010                   # RTCM UDP転送先ポート

# ============================================================================
# RTCM/RTK 設定（gcs.yml 由来）
# ============================================================================
rtcm:
  enabled: true
  host: 127.0.0.1
  port: 2101

# ============================================================================
# 共通設定
# ============================================================================
log:
  level: INFO
  stats_interval_sec: 5

retry:
  reconnect_sec: 3.0