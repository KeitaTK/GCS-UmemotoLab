services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: ts-kanban-nambu
    hostname: ts-kanban-nambu
    cap_add:
      - net_admin
      - sys_module
    environment:
      - TS_USERSPACE=false
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./tailscale_state:/var/lib/tailscale
    restart: unless-stopped

  kanban:
    image: node:22-slim
    container_name: kanban-nambu
    network_mode: "service:tailscale"
    volumes:
      - ./:/app
    working_dir: /app
    command: sh -c "npm install -g kanban && node /app/scripts/patch_kanban_cli.js && kanban --host 0.0.0.0 --port 3484 --no-passcode"
    restart: unless-stopped
    depends_on:
      - tailscale
