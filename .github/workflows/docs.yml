name: Generate Sphinx Documentation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'docs_sphinx/source/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ main ]

jobs:
  build-docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install sphinx sphinx-autodoc-typehints PyYAML pymavlink
    
    - name: Build documentation
      run: |
        cd docs_sphinx
        sphinx-apidoc -f -o source ../app
        sphinx-build -b html source build/html
    
    - name: Upload documentation artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: sphinx-docs
        path: docs_sphinx/build/html/
        retention-days: 30
    
    - name: Check for broken links (optional)
      run: |
        cd docs_sphinx
        sphinx-build -b linkcheck source build/linkcheck || true
      continue-on-error: true
